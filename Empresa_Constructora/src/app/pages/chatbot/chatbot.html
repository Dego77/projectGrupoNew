<div class="chatbot-container">

  <div class="chat-card">

    <div class="chat-header">
      <h1>🤖 Asistente IA ConstructPro</h1>
      <p class="chat-subtitle">Pregunta sobre tus proyectos, materiales, presupuestos, empleados, compras e ingresos</p>
    </div>

    <div class="chat-box" #chatBox>

      <div
        *ngFor="let m of mensajes"
        class="mensaje"
        [ngClass]="m.tipo"
      >
        {{ m.texto }}
      </div>

      <div
        *ngIf="cargando"
        class="mensaje ia typing-indicator"
      >
        <span></span><span></span><span></span>
      </div>

    </div>

    <div class="input-area">

      <input
        type="text"
        [(ngModel)]="pregunta"
        placeholder="Escribe tu pregunta..."
        (keyup.enter)="enviarPregunta()"
        [disabled]="cargando"
        class="chat-input"
      >

      <button
        class="btn-send"
        (click)="enviarPregunta()"
        [disabled]="cargando"
      >
        Enviar
      </button>
      
      <button 
        class="btn-record"
        (click)="iniciarGrabacion()" 
        [disabled]="cargando"
      >
        🎤 Grabar
      </button>

      <button 
        class="btn-stop"
        (click)="detenerGrabacion()" 
        [disabled]="cargando"
      >
        ⏹️ Detener
      </button>

    </div>

  </div>

</div>
