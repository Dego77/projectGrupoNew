<div class="container">

  <div class="card">

    <div class="icon">
      ➜
    </div>

    <h1>Iniciar Sesión</h1>

    <input
      type="email"
      placeholder="Email de la Empresa"
      [(ngModel)]="loginData.email"
    >

    <input
      type="password"
      placeholder="Contraseña"
      [(ngModel)]="loginData.password"
    >

    <div
  class="forgot"
  routerLink="/recuperar-password"
>
  ¿Olvidaste tu contraseña?
</div>

    <button
      class="btn-login"
      (click)="iniciarSesion()"
    >
      INGRESAR
    </button>

    <button
      class="btn-back"
      routerLink="/"
    >
      VOLVER AL INICIO
    </button>

  </div>

</div>
