<div class="container">

  <div class="card">

    <div class="icon">
      🔒
    </div>

    <h1>Recuperar Contraseña</h1>

    <p>
      Ingresa el correo de tu empresa
    </p>

    <input
      type="email"
      placeholder="Correo Empresarial"
      [(ngModel)]="email"
    >

    <button
      class="btn-send"
      (click)="recuperarPassword()"
    >
      ENVIAR RECUPERACIÓN
    </button>

    <button
      class="btn-back"
      routerLink="/login"
    >
      VOLVER AL LOGIN
    </button>

  </div>

</div>
