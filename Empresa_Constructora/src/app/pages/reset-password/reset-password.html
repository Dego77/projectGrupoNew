<div class="container">

  <div class="card">

    <h1>Nueva Contraseña</h1>

    <input
      type="password"
      placeholder="Nueva Contraseña"
      [(ngModel)]="nuevaPassword"
    >

    <input
      type="password"
      placeholder="Confirmar Contraseña"
      [(ngModel)]="confirmarPassword"
    >

    <button
      class="btn-save"
      (click)="cambiarPassword()"
    >
      ACTUALIZAR CONTRASEÑA
    </button>

  </div>

</div>
